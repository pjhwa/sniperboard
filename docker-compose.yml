services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: sniperboard-backend:latest
    container_name: sniperboard-backend
    ports:
      - "5001:8000"
    environment:
      # 소셜 심리 데이터 소스 (market-sentiment-data GitHub 리포)
      # 예: https://raw.githubusercontent.com/<user>/market-sentiment-data/main/sentiment/latest.json
      SENTIMENT_DATA_URL: "https://raw.githubusercontent.com/pjhwa/market-sentiment-data/main/sentiment/latest.json"
      # sentiment/history/ 디렉토리 base URL (파일명 없이)
      SENTIMENT_DATA_HISTORY_BASE: "https://raw.githubusercontent.com/pjhwa/market-sentiment-data/main/sentiment/history"
      # AI Brief + Earnings Intelligence
      BRIEF_DATA_URL: "https://raw.githubusercontent.com/pjhwa/market-sentiment-data/main/brief/latest.json"
      EARNINGS_DATA_URL: "https://raw.githubusercontent.com/pjhwa/market-sentiment-data/main/earnings/latest.json"
      MACRO_INSIGHT_URL: "https://raw.githubusercontent.com/pjhwa/market-sentiment-data/main/macro/latest.json"
      # Private 리포일 때만 필요 (GitHub PAT). Public이면 빈 채로 두세요.
      SENTIMENT_DATA_TOKEN: ""
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:8000
    image: sniperboard-frontend:latest
    container_name: sniperboard-frontend
    ports:
      - "4000:3000"
    environment:
      BACKEND_URL: "http://backend:8000"
    depends_on:
      - backend
    restart: unless-stopped
