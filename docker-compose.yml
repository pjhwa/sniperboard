services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: sniperboard-backend:latest
    container_name: sniperboard-backend
    ports:
      - "5000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://172.16.8.250:5000
    image: sniperboard-frontend:latest
    container_name: sniperboard-frontend
    ports:
      - "4000:3000"
    depends_on:
      - backend
    restart: unless-stopped
